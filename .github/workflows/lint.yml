name: Lint & Static Analysis

# Report-only static analysis for C++, Java, and frontend. Serious C++ issues fail the
# build; Java and frontend linters report without blocking (matching security-scan style).

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  cpp-static-analysis:
    name: C++ (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck on matching-engine
        run: |
          set -o pipefail
          cppcheck --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            --inline-suppr \
            services/matching-engine/src services/matching-engine/include \
            2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
          if-no-files-found: ignore

  java-static-analysis:
    name: Java (SpotBugs report)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run SpotBugs on all Java services (report-only)
        run: |
          set -e
          for svc in eureka-server config-server api-gateway market-data-service; do
            echo "::group::SpotBugs :: $svc"
            mvn -B -ntp -f "services/$svc/pom.xml" \
              com.github.spotbugs:spotbugs-maven-plugin:4.8.6.0:spotbugs \
              -Dspotbugs.failOnError=false
            echo "::endgroup::"
          done

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: services/**/target/spotbugsXml.xml
          if-no-files-found: ignore

  frontend-lint:
    name: Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
