services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ledgerbull-timescaledb
    environment:
      POSTGRES_USER: ledgerbull
      POSTGRES_PASSWORD: ledgerbull_local_dev   # local dev only — real creds via env in deployment
      POSTGRES_DB: ledgerbull
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerbull -d ledgerbull"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ledgerbull-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  timescale_data:
