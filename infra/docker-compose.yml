services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ledgerbull-timescaledb
    environment:
      POSTGRES_USER: ledgerbull
      POSTGRES_PASSWORD: ledgerbull_local_dev   # local dev only — real creds via env in deployment
      POSTGRES_DB: ledgerbull
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerbull -d ledgerbull"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ledgerbull-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ledgerbull-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledgerbull}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerbull}
      POSTGRES_DB: ${POSTGRES_DB:-ledgerbull_execution}
    ports:
      - "5433:5432"   # host 5432 is used by timescaledb
    volumes:
      - ledgerbull-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerbull -d ledgerbull_execution"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  position-postgres:
    image: postgres:16
    container_name: ledgerbull-position-postgres
    environment:
      POSTGRES_USER: ${POSITION_POSTGRES_USER:-ledgerbull}
      POSTGRES_PASSWORD: ${POSITION_POSTGRES_PASSWORD:-ledgerbull}
      POSTGRES_DB: ${POSITION_POSTGRES_DB:-ledgerbull_position}
    ports:
      - "5434:5432"
    volumes:
      - ledgerbull-position-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerbull -d ledgerbull_position"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  market-data-service:
    build:
      context: ../services/market-data-service
      dockerfile: Dockerfile
    image: ledgerbull/market-data-service:latest
    container_name: ledgerbull-market-data-service
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_PASSWORD: ledgerbull_local_dev   # local dev only — real creds via env in deployment
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/ledgerbull
      SPRING_DATA_REDIS_HOST: redis
      # Eureka/Config run on the host (via Maven), reachable from the container via host gateway.
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://host.docker.internal:8761/eureka
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  timescale_data:
  ledgerbull-postgres-data:
  ledgerbull-position-postgres-data:
