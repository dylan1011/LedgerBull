server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: market-data-service
              uri: lb://market-data-service
              predicates:
                - Path=/api/market-data/**
            - id: execution-service
              uri: lb://execution-service
              predicates:
                - Path=/api/execution/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
