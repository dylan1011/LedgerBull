server:
  port: 8081
spring:
  application:
    name: market-data-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ledgerbull
    username: ledgerbull
    password: ${DB_PASSWORD:ledgerbull_local_dev}   # env override in deployment
    hikari:
      # Don't hard-fail the pool at boot if the DB isn't reachable yet; keep retrying instead.
      initialization-fail-timeout: -1
      connection-timeout: 10000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate      # we manage schema explicitly; do NOT use create-drop in a real service
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms          # fail fast if Redis is slow/down (cache, not source of truth)
      connect-timeout: 500ms
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
marketdata:
  symbols: BTC-USD,ETH-USD
  websocket-url: wss://ws-feed.exchange.coinbase.com
  batch:
    size: 100                # flush when this many ticks buffered...
    flush-interval-ms: 1000  # ...or every second, whichever comes first
    max-buffer: 10000        # bounded buffer; oldest ticks dropped on overflow
